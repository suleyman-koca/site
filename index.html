<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yiğit Koca | Developer Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #A7C9D6; 
            color: #2c3e50; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; 
            padding: 50px 20px;
        }
        header { margin: 0 auto 40px auto; max-width: 800px; }
        header h1 {
            font-size: 28px; font-weight: bold; letter-spacing: 2px;
            margin-bottom: 20px; color: #1a252f; text-transform: uppercase;
        }
        nav { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        nav a {
            color: #2c3e50; text-decoration: none; font-size: 14px;
            font-weight: bold; letter-spacing: 1px; transition: color 0.3s ease;
        }
        nav a:hover { color: #d35400; }
        .profile-img {
            display: block; margin: 0 auto 40px auto; max-width: 350px; width: 100%;
            border-radius: 50%; aspect-ratio: 1 / 1; object-fit: cover; 
        }
        .about-section { margin: 0 auto; max-width: 600px; }
        .about-section h2 {
            font-size: 22px; letter-spacing: 1.5px; margin-bottom: 15px;
            color: #1a252f; text-transform: uppercase;
        }
        .about-section p { font-size: 16px; line-height: 1.6; color: #34495e; }
    </style>
</head>
<body>
    <header>
        <h1>YİĞİT KOCA</h1>
        <nav>
            <a href="#">HOME</a>
            <a href="#">PROJECTS</a>
            <a href="#">SKILLS</a>
            <a href="#">CONTACT</a>
        </nav>
    </header>
    <img src="https://raw.githubusercontent.com/suleyman-koca/site/main/yigitkoca.jpg" alt="Yiğit Koca" class="profile-img">
    <section class="about-section">
        <h2>ABOUT THE MAKER</h2>
        <p>Geliştirici ve Maker olarak projeler üretiyor, fikirleri gerçeğe dönüştürüyorum.<br>Bu site yapım aşamasındadır.</p>
    </section>
</body>
</html>
